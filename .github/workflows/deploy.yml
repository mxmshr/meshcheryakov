name: Deploy to Beget

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Beget
        uses: appleboy/scp-action@v0.1.7
        with:
          host: maximm.beget.tech
          username: maximm
          key: ${{ secrets.BEGET_SSH_KEY }}
          source: "."
          target: "/home/m/maximm/public_html"
          strip_components: 0
